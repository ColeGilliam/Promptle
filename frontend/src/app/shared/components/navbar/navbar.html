<nav class="topbar">
  <!-- Brand -->
  <div class="nav-left">
    <a
      class="brand"
      [class.brand--active]="isPromptleRoute"
      routerLink="/"
      aria-label="Promptle home"
      [attr.aria-current]="isPromptleRoute ? 'page' : null"
    >
      <img [src]="isDarkTheme ? 'promptle_logo_dark1.png' : 'PromptleLogoTransparent.png'" class="brand-logo" alt="">
      <span class="brand-name">Promptle</span>
    </a>

    <a
      class="game-brand game-brand--connections"
      [class.game-brand--active]="isConnectionsRoute"
      routerLink="/connections"
      aria-label="Open Connections"
      [attr.aria-current]="isConnectionsRoute ? 'page' : null"
    >
      <span class="game-brand-icon">
        <mat-icon>grid_view</mat-icon>
      </span>
      <span class="game-brand-name">Connections</span>
    </a>

    <a
      class="game-brand game-brand--crossword"
      [class.game-brand--active]="isCrosswordRoute"
      routerLink="/crossword"
      aria-label="Open Crossword"
      [attr.aria-current]="isCrosswordRoute ? 'page' : null"
    >
      <span class="game-brand-icon">
        <span class="crossword-nav-icon" aria-hidden="true">
          <span class="crossword-nav-cell"></span>
          <span class="crossword-nav-cell"></span>
          <span class="crossword-nav-cell crossword-nav-cell--blocked"></span>
          <span class="crossword-nav-cell"></span>
          <span class="crossword-nav-cell crossword-nav-cell--blocked"></span>
          <span class="crossword-nav-cell"></span>
          <span class="crossword-nav-cell crossword-nav-cell--blocked"></span>
          <span class="crossword-nav-cell"></span>
          <span class="crossword-nav-cell"></span>
        </span>
      </span>
      <span class="game-brand-name">Crossword</span>
    </a>
  </div>

  <span class="spacer"></span>

  <!-- User chip (logged in) -->
  <div *ngIf="isLoggedIn" class="user-chip">
    <img [src]="dbProfilePic || 'assets/default-avatar.png'" class="nav-avatar" alt="Avatar">
    <span class="nav-username">{{ dbUsername || 'Player' }}</span>
  </div>

  <!-- Right actions -->
  <div class="nav-actions">
    <button
      type="button"
      class="icon-btn"
      (click)="openHowToPlay()"
      aria-label="How to play"
    >
      <mat-icon>help_outline</mat-icon>
    </button>

    <button
      type="button"
      class="icon-btn"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <mat-icon>{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <div class="menu-wrap">
      <!-- Backdrop to close menu on outside click -->
      <div class="menu-backdrop" *ngIf="showMenu" (click)="showMenu = false"></div>

      <button type="button" class="icon-btn" (click)="showMenu = !showMenu" aria-label="Open menu">
        <mat-icon>{{ showMenu ? 'close' : 'menu' }}</mat-icon>
      </button>

      <div class="dropdown" [class.dropdown--open]="showMenu">
        <a *ngIf="router.url !== '/'" class="dropdown-item" routerLink="/" (click)="showMenu = false">
          <mat-icon>home</mat-icon>
          <span>Home</span>
        </a>
        <a *ngIf="!isLoggedIn" class="dropdown-item" (click)="toggleLogin(); showMenu = false">
          <mat-icon>login</mat-icon>
          <span>Login</span>
        </a>
        <a *ngIf="isLoggedIn" class="dropdown-item" routerLink="/profile" (click)="showMenu = false">
          <mat-icon>face</mat-icon>
          <span>Profile</span>
        </a>
        <button type="button" class="dropdown-item" (click)="openSettings(); showMenu = false">
          <mat-icon>tune</mat-icon>
          <span>Settings</span>
        </button>
        <a *ngIf="isDevAccount" class="dropdown-item" routerLink="/dev-settings" (click)="showMenu = false">
          <mat-icon>settings</mat-icon>
          <span>Dev Settings</span>
        </a>
        <div *ngIf="isLoggedIn" class="dropdown-divider"></div>
        <a *ngIf="isLoggedIn" class="dropdown-item dropdown-item--danger" (click)="toggleLogin(); showMenu = false">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </a>
      </div>
    </div>
  </div>
</nav>
