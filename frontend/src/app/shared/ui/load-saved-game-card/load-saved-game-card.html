<mat-card class="load-confirm-card">
  <mat-card-content>
    <h3>Saved game found</h3>
    <p *ngIf="topic">Topic: <strong>{{ topic }}</strong></p>
    <p *ngIf="savedAt" class="load-confirm-meta">Saved: {{ savedAt }}</p>

    <div class="load-confirm-actions">
      <button matButton="filled" class="rect-btn promp1-btn" (click)="onContinueClicked()">Continue Saved Game</button>
      <button matButton="outlined" class="rect-btn promp2-btn" (click)="onCancelClicked()">Cancel</button>
      <button matButton="text" class="rect-btn promp2-btn" (click)="onStartNewClicked()">Start New Game</button>
      <button matButton="filled" class="rect-btn promp2-btn" color="warn" (click)="onDeleteClicked()">Delete Saved Game</button>
    </div>
  </mat-card-content>
</mat-card>
