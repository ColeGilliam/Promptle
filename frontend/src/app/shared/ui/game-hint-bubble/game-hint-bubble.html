@if (visible) {
  <div class="bubble-wrap"
    [class.arrow-up]="arrowSide === 'up'"
    [class.arrow-down]="arrowSide === 'down'"
    [class.arrow-left]="arrowSide === 'left'"
    [@bubble]>
    <div class="bubble-row">
      <mat-icon class="bubble-icon">{{ icon }}</mat-icon>
      <span class="bubble-text" [innerHTML]="message"></span>
    </div>
    <div class="bubble-footer">
      <label class="bubble-hints-toggle">
        <input type="checkbox" (change)="disableHints()" />
        <span>Disable hints</span>
      </label>
      <button class="bubble-got-it" (click)="dismiss()">Got it</button>
    </div>
  </div>
}
