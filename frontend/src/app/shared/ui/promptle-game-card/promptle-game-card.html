<mat-card class="game-topic-card">
  <mat-card-content class="game-topic-content" [class.split-topic-card]="isMultiplayer">
    <div class="game-topic-left">
      <img class="game-topic-logo" src="PromptleLogoTransparent.png" alt="Promptle logo">
      <div class="game-topic-copy">
        <p class="game-topic-kicker">Promptle</p>
        <ng-container *ngIf="loading; else loadedTopic">
          <h1 class="game-topic-title topic-loading-title" aria-live="polite">
            Loading topic...
          </h1>
          <mat-progress-bar mode="indeterminate" class="topic-loading-bar"></mat-progress-bar>
        </ng-container>

        <ng-template #loadedTopic>
          <h1 class="game-topic-title">{{ topic || 'Loading topic...' }}</h1>
        </ng-template>
      </div>
    </div>

    <div class="game-topic-right" *ngIf="isMultiplayer">
      <p class="topic-mp-heading">
        Multiplayer Room - <span class="topic-mp-room-inline">{{ currentRoom || 'Connecting...' }}</span>
      </p>
      <p class="topic-mp-players-line">
        Players ({{ players.length }}) <span class="topic-mp-player-names">{{ playerNamesText }}</span>
      </p>
    </div>
  </mat-card-content>
</mat-card>
