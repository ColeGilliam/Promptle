<mat-card class="game-topic-card">
  <mat-card-content class="game-topic-content" [class.split-topic-card]="isMultiplayer">
    <div class="game-topic-left-shell" [class.left-hidden]="isMultiplayer && leftPanelHidden">
      <button
        *ngIf="isMultiplayer"
        matMiniFab
        type="button"
        class="left-pane-toggle"
        [class.left-pane-toggle-enabled]="!leftPanelHidden"
        [class.left-pane-toggle-disabled]="leftPanelHidden"
        (click)="toggleLeftPanel()"
        [attr.aria-label]="leftPanelHidden ? 'Show topic panel' : 'Hide topic panel'"
      >
        <mat-icon>{{ leftPanelHidden ? 'chat_bubble_outline' : 'chat_bubble' }}</mat-icon>
      </button>

      <div
        class="game-topic-left"
        [@leftPane]="isMultiplayer && leftPanelHidden ? 'hidden' : 'visible'"
        [attr.aria-hidden]="isMultiplayer && leftPanelHidden ? 'true' : null"
      >
        <img class="game-topic-logo" src="PromptleLogoTransparent.png" alt="Promptle logo">
        <div class="game-topic-copy">
          <p class="game-topic-kicker">Promptle</p>
          <ng-container *ngIf="loading; else loadedTopic">
            <h1 class="game-topic-title topic-loading-title" aria-live="polite">
              Loading topic...
            </h1>
            <mat-progress-bar mode="indeterminate" class="topic-loading-bar"></mat-progress-bar>
          </ng-container>

          <ng-template #loadedTopic>
            <h1 class="game-topic-title">{{ topic || 'Loading topic...' }}</h1>
          </ng-template>
        </div>
      </div>
    </div>

    <div class="game-topic-right" *ngIf="isMultiplayer">
      <p class="topic-mp-heading">
        Multiplayer Room - <span class="topic-mp-room-inline">{{ currentRoom || 'Connecting...' }}</span>
      </p>
      <div class="player-row" *ngFor="let player of players">
        <span class="player-name">
          {{ player.name }}{{ player.isMe ? ' (Me)' : '' }}
          <span *ngIf="player.won"> 🏆</span>
        </span>

        <!-- Color dots from last guess -->
        <div class="player-colors" *ngIf="player.colors?.length">
          <span
            *ngFor="let color of player.colors"
            class="color-dot"
            [style.background-color]="color"
          ></span>
        </div>

        <!-- No guess yet -->
        <div class="player-colors" *ngIf="!player.colors?.length">
          <span class="color-dot empty" *ngFor="let h of headers"></span>
        </div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
