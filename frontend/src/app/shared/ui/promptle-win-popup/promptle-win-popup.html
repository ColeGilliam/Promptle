<div class="win-overlay" role="dialog" aria-modal="true" aria-labelledby="win-popup-title">
  <mat-card class="win-card">
    <mat-card-content>
      <h2 id="win-popup-title">🏆 Victory!</h2>
      <p>The correct answer was <strong>{{ answerName }}</strong></p>
      <div class="win-actions">
        <button matButton="filled" class="rect-btn promp2-btn" (click)="onReturnHome()">Return Home</button>
        <ng-container *ngIf="!isMultiplayer">
          <button matButton="filled" class="rect-btn promp1-btn" (click)="onPlayAgain()">Play Again (Different Answer)</button>
        </ng-container>
      </div>
    </mat-card-content>
  </mat-card>
</div>
