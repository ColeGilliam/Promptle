<div class="upgrade-notice">
  <div class="upgrade-notice__icon">
    <mat-icon>lock</mat-icon>
  </div>
  <div class="upgrade-notice__body">
    <span class="upgrade-notice__title">Custom AI games require a plan</span>
    <span class="upgrade-notice__sub">$3&thinsp;/&thinsp;month &nbsp;&bull;&nbsp; 150 tokens for $5 — tokens never expire</span>
  </div>
  <button class="upgrade-notice__cta" (click)="goToUpgrade()">
    Upgrade
    <mat-icon>arrow_forward</mat-icon>
  </button>
  <button class="upgrade-notice__close" (click)="dismiss()" aria-label="Dismiss">
    <mat-icon>close</mat-icon>
  </button>
</div>
