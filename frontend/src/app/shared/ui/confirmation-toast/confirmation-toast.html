<div class="confirmation-toast-shell" role="presentation" (click)="onCancel()">
  <section
    class="confirmation-toast"
    [class.confirmation-toast--danger]="tone === 'danger'"
    [class.confirmation-toast--neutral]="tone === 'neutral'"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirmation-toast-title"
    aria-describedby="confirmation-toast-message"
    (click)="$event.stopPropagation()"
  >
    <div class="confirmation-toast__icon" aria-hidden="true">
      <mat-icon>{{ icon }}</mat-icon>
    </div>

    <div class="confirmation-toast__copy">
      <h2 id="confirmation-toast-title">{{ title }}</h2>
      <p id="confirmation-toast-message">{{ message }}</p>
      <p class="confirmation-toast__countdown" aria-live="polite">
        Continuing in {{ countdownRemaining }} second{{ countdownRemaining === 1 ? '' : 's' }}.
      </p>
    </div>

    <div class="confirmation-toast__actions">
      <button
        matButton="outlined"
        class="rect-btn promp3-btn confirmation-toast__button confirmation-toast__button--cancel"
        type="button"
        (click)="onCancel()"
      >
        {{ cancelLabel }}
      </button>
      <button
        matButton="filled"
        class="rect-btn promp2-btn confirmation-toast__button confirmation-toast__button--confirm"
        type="button"
        (click)="onConfirm()"
      >
        <mat-icon>{{ tone === 'danger' ? 'delete' : 'check' }}</mat-icon>
        {{ confirmLabel }}
      </button>
    </div>
  </section>
</div>
