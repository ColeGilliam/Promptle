<footer class="mini-footer" aria-label="Site footer">
  <mat-divider class="mini-footer__divider"></mat-divider>

  <div class="mini-footer__row">
    <a class="mat-body-2 mini-footer__brand mini-footer__link" routerLink="/">Promptle</a>

    <mat-icon class="mini-footer__dot" aria-hidden="true">circle</mat-icon>

    <a class="mat-body-2 mini-footer__link mini-footer__game-link" routerLink="/connections">Connections</a>

    <mat-icon class="mini-footer__dot" aria-hidden="true">circle</mat-icon>

    <a class="mat-body-2 mini-footer__link mini-footer__game-link" routerLink="/crossword">Crossword</a>

    <mat-icon class="mini-footer__dot" aria-hidden="true">circle</mat-icon>

    <a class="mat-body-2 mini-footer__link" routerLink="/privacy">Privacy</a>

    <mat-icon class="mini-footer__dot" aria-hidden="true">circle</mat-icon>

    <a class="mat-body-2 mini-footer__link" routerLink="/terms">Terms</a>

    @if (isDevAccount) {
      <mat-icon class="mini-footer__dot" aria-hidden="true">circle</mat-icon>
      <a class="mat-body-2 mini-footer__link" routerLink="/about">About</a>
    }

    <mat-icon class="mini-footer__dot" aria-hidden="true">circle</mat-icon>

    <span class="mat-body-2 mini-footer__text">&copy; {{ year }} Promptle. All rights reserved.</span>
  </div>
</footer>
