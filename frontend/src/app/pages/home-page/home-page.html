<div class="home-first-view">
  <app-navbar></app-navbar>

  <!-- PROMPTLE LOGO -->
  <div class="home-main">
  <div class="logoTitle">
    <img src="PromptleLogoTransparent.png">
  </div>

  <!-- Toggle multiplayer / single player -->
  <div style="text-align: center; margin-top: 12px;">
    <app-switch-mode
      [isSingleplayer]="!isMultiplayer"
      (isSingleplayerChange)="onModeChange($event)"
    ></app-switch-mode>
  </div>

  <!-- Current mode indicator (helpful for testing)
  <div style="text-align: center; margin: 12px 0; font-weight: bold; color: #444;">
    Current mode: {{ isMultiplayer ? 'MULTIPLAYER 👥' : 'SINGLE PLAYER 👤' }}
  </div> -->

  <!-- Single-player actions: show Load/New when in single-player mode -->
  <div class="mode-actions-wrap" *ngIf="!isMultiplayer">
    <div class="mode-actions-row">
      <button matButton="elevated" class="rect-btn promp2-btn mode-action-btn" (click)="onLoadClicked()" [disabled]="!hasSavedGame">LOAD GAME</button>
      <button matButton="elevated" class="rect-btn promp2-btn mode-action-btn" (click)="newGame()">NEW GAME</button>
    </div>
  </div>

  <!-- Multiplayer actions: show Join/Create when in multiplayer mode -->
  <div class="mode-actions-wrap" *ngIf="isMultiplayer">
    <div class="mode-actions-row">
      <button matButton="filled" class="rect-btn promp2-btn mode-action-btn" (click)="joinChatRoom()">JOIN CHAT ROOM</button>
      <button matButton="filled" class="rect-btn promp2-btn mode-action-btn" (click)="createRoom()">CREATE ROOM</button>
    </div>
  </div>

  <!-- Topic selection cards (shared, but text/buttons adapt to mode) -->
  <div class="topic-selection" *ngIf="!showLoadConfirm">

    <div class="columns">

      <!-- LEFT: Popular Topics -->
      <div class="column">
        <mat-card class="option-card">
          <mat-card-content>
            <h2>Choose from Popular Topics</h2>

            <mat-form-field appearance="fill" class="topic-field">
              <mat-label>Select a topic</mat-label>
              <input
                type="text"
                matInput
                [matAutocomplete]="topicAuto"
                [(ngModel)]="selectedTopicQuery"
                (ngModelChange)="onTopicQueryChange($event)"
                placeholder="Start typing a topic"
              >
              <mat-autocomplete
                #topicAuto="matAutocomplete"
                (optionSelected)="onTopicOptionSelected($event.option.value)"
              >
                <mat-option *ngFor="let topic of filteredTopics" [value]="topic.topicName">
                  {{ topic.topicName }}
                </mat-option>
                <mat-option *ngIf="filteredTopics.length === 0" disabled>
                  No topics found
                </mat-option>
              </mat-autocomplete>
            </mat-form-field>

            <p class="subtext">
              This list will generate a game with no down time
              as it pulls from the MongoDB database
            </p>

            <button matButton="filled" class="rect-btn promp1-btn" 
                    [disabled]="!selectedTopic" 
                    (click)="startGame()">
              {{ isMultiplayer ? 'CREATE MULTIPLAYER ROOM' : 'PLAY THIS TOPIC' }}
            </button>
          </mat-card-content>
        </mat-card>
      </div>

      <!-- RIGHT: Create Unique (AI) -->
      <div class="column">
        <mat-card class="option-card">
          <mat-card-content>
            <h2>Create Unique</h2>

            <mat-form-field appearance="fill" class="topic-field">
              <mat-label>Enter a custom topic</mat-label>
              <input
                matInput
                placeholder="Enter any topic (e.g., Solar System, K-Pop groups)"
                [(ngModel)]="customTopic"
              >
            </mat-form-field>

            <p class="subtext">
              Uses AI to generate a new Promptle on the fly
            </p>

            <button matButton="filled" class="rect-btn promp1-btn" 
                    [disabled]="!customTopic.trim()" 
                    (click)="startAiGame()">
              {{ isMultiplayer ? 'CREATE MULTIPLAYER AI ROOM' : 'GENERATE AI GAME' }}
            </button>
          </mat-card-content>
        </mat-card>
      </div>

    </div>
  </div>

  <!-- Inline confirmation shown when user clicks LOAD and a saved game exists (single-player only) -->
  <app-load-saved-game-card
    *ngIf="showLoadConfirm && !isMultiplayer"
    [topic]="savedGameTopic"
    [savedAt]="savedGameSavedAt"
    (continueClicked)="continueSaved()"
    (cancelClicked)="cancelLoadConfirm()"
    (startNewClicked)="cancelLoadConfirm(); newGame()"
    (deleteClicked)="deleteSavedConfirm()"
  ></app-load-saved-game-card>
  </div>
</div>

<app-uni-footer></app-uni-footer>
