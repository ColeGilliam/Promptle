<div class="profile-view">
  <app-navbar></app-navbar>

  <div class="letters-bg" aria-hidden="true">
    <span class="fl fl-1">P</span>
    <span class="fl fl-2">R</span>
    <span class="fl fl-3">O</span>
    <span class="fl fl-4">M</span>
    <span class="fl fl-5">P</span>
    <span class="fl fl-6">T</span>
    <span class="fl fl-7">L</span>
    <span class="fl fl-8">E</span>
    <span class="fl fl-9">?</span>
    <span class="fl fl-10">P</span>
    <span class="fl fl-11">R</span>
    <span class="fl fl-12">O</span>
  </div>

  <div class="page-layout">
    <div class="profile-container" *ngIf="isLoggedIn">

      <!-- Top row: Profile card + Stats side by side -->
      <div class="profile-content">

        <!-- LEFT: Profile Card -->
        <mat-card class="profile-card">
          <mat-card-header>
            <mat-card-title>Your Profile</mat-card-title>
          </mat-card-header>

          <mat-card-content>
            <div class="avatar-section">
              <img [src]="selectedImageBase64 || dbProfilePic || 'https://via.placeholder.com/150'"
                   class="profile-avatar" alt="User Avatar">
              <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" hidden>
              <button matButton="filled" class="promp2-btn rect-btn" (click)="fileInput.click()">
                <mat-icon>upload</mat-icon> Upload Picture
              </button>
            </div>

            <mat-form-field appearance="fill" class="full-width">
              <mat-label>Display Username</mat-label>
              <input matInput [(ngModel)]="dbUsername" placeholder="Enter custom username">
            </mat-form-field>
          </mat-card-content>

          <mat-card-actions class="actions">
            <button matButton="filled" class="promp2-btn rect-btn" (click)="saveProfile()">
              Save Changes
            </button>
            <button matButton="filled" class="promp2-btn rect-btn" (click)="deleteAccount()">
              Delete Account
            </button>
          </mat-card-actions>
        </mat-card>

        <!-- RIGHT: Stats Card -->
        <mat-card class="stats-card">
          <mat-card-header>
            <mat-card-title>Player Stats</mat-card-title>
          </mat-card-header>

          <mat-card-content>
            <div class="stat-item">
              <span class="stat-label">Total Wins:</span>
              <span class="stat-value">{{ winCount }}</span>
            </div>
          </mat-card-content>
        </mat-card>

      </div>
    </div>

    <!-- Not logged in message -->
    <div *ngIf="!isLoggedIn" class="not-logged-in">
      <p>Please log in to view your profile.</p>
    </div>
  </div>
</div>
